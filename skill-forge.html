<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skill Forge - 将知识锻造成装备</title>


<!-- Markdown CSS -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">

<!-- Tailwind CSS CDN -->
<script>
tailwind = { config: { theme: { extend: { colors: {
  'rarity-white': '#C0C0C0', 'rarity-green': '#33FF57', 'rarity-blue': '#3399FF',
  'rarity-purple': '#B44CFF', 'rarity-orange': '#FF7700', 'rarity-red': '#FF2244',
  'bg-dark': '#0B0B16', 'bg-panel': '#151525', 'text-primary': '#D8D0C0',
  'text-secondary': '#908878', 'accent': '#D4A843',
  'surface': '#1A1A2E', 'border': '#2A2A40',
} } } } };

<script src="https://cdn.tailwindcss.com"></script>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #0B0B16;
  color: #D8D0C0;
  font-family: 'Segoe UI', system-ui, sans-serif;
  overflow: hidden;
  width: 100vw; height: 100vh;
}
}

#root { width: 100%; height: 100%; }

.rpg-text { font-family: 'Cinzel','Georgia',serif; letter-spacing:0.04em; }
.rpg-panel { background: linear-gradient(180deg,#151525,#121220); border:1px solid #2A2A3A; border-radius:12px; box-shadow:0 4px 24px rgba(0,0,0,0.4),inset 0 1px 0 rgba(255,255,255,0.03); }
.eq-card { transition: all 0.3s cubic-bezier(0.4,0,0.2,1); }
.eq-card:hover { transform: translateY(-2px); }
.eq-red:hover { animation: pulse-glow 1.5s ease-in-out infinite; }
.eq-orange:hover { animation: pulse-glow 2s ease-in-out infinite; }
.eq-purple:hover { animation: pulse-glow 2.5s ease-in-out infinite; }
.eq-white { background: linear-gradient(135deg, #1A1A2E, #252540); border-color: rgba(192,192,192,0.3); box-shadow: 0 0 8px rgba(192,192,192,0.12); }
.eq-green { background: linear-gradient(135deg, #1A2A1E, #253025); border-color: rgba(51,255,87,0.4); box-shadow: 0 0 10px rgba(51,255,87,0.2); }
.eq-blue { background: linear-gradient(135deg, #1A1E2A, #202540); border-color: rgba(51,153,255,0.4); box-shadow: 0 0 12px rgba(51,153,255,0.25); }
.eq-purple { background: linear-gradient(135deg, #1E1A2A, #2A2040); border-color: rgba(180,76,255,0.4); box-shadow: 0 0 14px rgba(180,76,255,0.3); }
.eq-orange { background: linear-gradient(135deg, #2A1E1A, #403020); border-color: rgba(255,119,0,0.5); box-shadow: 0 0 16px rgba(255,119,0,0.35); }
.eq-red { background: linear-gradient(135deg, #2A1A1A, #402020); border-color: rgba(255,34,68,0.6); box-shadow: 0 0 20px rgba(255,34,68,0.4); }
.rarity-label { font-family:'Cinzel',serif; font-size:10px; letter-spacing:0.06em; padding:2px 10px; border-radius:3px; text-transform:uppercase; border:1px solid; display:inline-block; }
.rpg-divider { height:1px; background:linear-gradient(90deg,transparent,rgba(212,168,67,0.4),transparent); margin:12px 0; }

/* Boss panel - dark fantasy horror aesthetic */
.boss-overlay {
  background:
    radial-gradient(ellipse at 50% 0%, rgba(180,0,0,0.08) 0%, transparent 60%),
    radial-gradient(ellipse at 20% 80%, rgba(80,0,0,0.06) 0%, transparent 40%),
    radial-gradient(ellipse at 80% 80%, rgba(60,0,0,0.06) 0%, transparent 40%),
    #0A0808;
}
.boss-card {
  position: relative; overflow: hidden;
  background: linear-gradient(160deg, #1A1012 0%, #120C0E 50%, #0F0B0C 100%);
  border: 1px solid #2A1518;
  transition: all 0.4s ease;
}
.boss-card::before {
  content: ''; position: absolute; inset: 0; pointer-events: none;
  background: radial-gradient(ellipse at 50% 0%, rgba(200,30,30,0.06) 0%, transparent 70%);
  opacity: 0; transition: opacity 0.4s;
}
.boss-card:hover { border-color: rgba(200,30,30,0.5); }
.boss-card:hover::before { opacity: 1; }
.boss-card.ready {
  border-color: rgba(220,40,40,0.6);
  box-shadow: 0 0 20px rgba(180,0,0,0.15), 0 0 40px rgba(100,0,0,0.08);
  animation: boss-pulse 3s ease-in-out infinite;
}
.boss-card.ready::after {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px; pointer-events: none;
  background: linear-gradient(90deg, transparent, rgba(255,60,60,0.4), transparent);
}
@keyframes boss-pulse {
  0%, 100% { box-shadow: 0 0 20px rgba(180,0,0,0.15), 0 0 40px rgba(100,0,0,0.08); }
  50% { box-shadow: 0 0 30px rgba(200,30,30,0.25), 0 0 60px rgba(120,0,0,0.12); }
}
.boss-btn {
  font-family: 'Cinzel', serif; letter-spacing: 0.08em;
  background: linear-gradient(180deg, #3A1015 0%, #20080A 100%);
  border: 1px solid #5A2025;
  color: #E0A0A0;
  transition: all 0.3s;
}
.boss-btn:hover:not(:disabled) {
  background: linear-gradient(180deg, #5A1520 0%, #301012 100%);
  border-color: #8A3035;
  color: #FFCCCC;
  box-shadow: 0 0 16px rgba(200,40,40,0.3);
}
.boss-btn:disabled { opacity: 0.35; }
.boss-header {
  border-bottom: 1px solid #2A1015;
  background: linear-gradient(180deg, #140A0D 0%, #0F080A 100%);
  box-shadow: 0 2px 20px rgba(180,0,0,0.08);
}
.boss-title {
  font-family: 'Cinzel', serif;
  color: #E04040;
  text-shadow: 0 0 12px rgba(200,40,40,0.4), 0 2px 4px rgba(0,0,0,0.8);
}

/* Pokémon-style Battle Arena */
.battle-arena {
  background:
    radial-gradient(ellipse at 50% 20%, rgba(40,60,40,0.5) 0%, transparent 60%),
    radial-gradient(ellipse at 50% 80%, rgba(30,20,40,0.4) 0%, transparent 50%),
    linear-gradient(180deg, #1a2a1a 0%, #162016 30%, #121018 70%, #0d0d1a 100%);
  border: 2px solid #3a4a3a;
  border-radius: 16px;
  box-shadow: 0 0 40px rgba(0,0,0,0.5), inset 0 0 80px rgba(0,0,0,0.3);
  position: relative;
  overflow: hidden;
}
.battle-arena::before {
  content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 25%;
  background: linear-gradient(180deg, transparent, rgba(20,30,15,0.6));
  border-radius: 0 0 14px 14px;
  pointer-events: none;
}
.battle-hp-bar-bg {
  background: #1a1a1a;
  border: 2px solid #444;
  border-radius: 8px;
  height: 14px;
  overflow: hidden;
  box-shadow: inset 0 2px 4px rgba(0,0,0,0.6);
}
.battle-hp-bar-fill {
  height: 100%;
  border-radius: 6px;
  transition: width 0.5s ease-out;
  background: linear-gradient(180deg, #4ae04a 0%, #2a8a2a 100%);
  box-shadow: 0 0 6px rgba(74,224,74,0.3);
}
.battle-hp-bar-fill.warning { background: linear-gradient(180deg, #e0c040 0%, #a08020 100%); box-shadow: 0 0 6px rgba(224,192,64,0.3); }
.battle-hp-bar-fill.danger { background: linear-gradient(180deg, #e04040 0%, #a02020 100%); box-shadow: 0 0 6px rgba(224,64,64,0.4); animation: hp-pulse 0.6s ease-in-out infinite; }
@keyframes hp-pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.5; }
}
.battle-sprite {
  font-size: 64px;
  filter: drop-shadow(0 4px 8px rgba(0,0,0,0.5));
  transition: transform 0.2s;
  animation: battle-float 2.5s ease-in-out infinite;
}
.battle-sprite.player {
  font-size: 56px;
  animation-delay: -0.8s;
}
.battle-sprite.shake {
  animation: battle-shake 0.4s ease-in-out, battle-float 2.5s ease-in-out infinite;
}
.battle-sprite.flash {
  animation: battle-flash 0.15s ease-in-out 3, battle-float 2.5s ease-in-out infinite;
}
@keyframes battle-float {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-6px); }
}
@keyframes battle-shake {
  0%, 100% { transform: translateX(0); }
  20% { transform: translateX(-8px); }
  40% { transform: translateX(8px); }
  60% { transform: translateX(-6px); }
  80% { transform: translateX(6px); }
}
@keyframes battle-flash {
  0%, 100% { opacity: 1; }
  50% { opacity: 0; }
}
.battle-skill-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}
.battle-skill-btn {
  font-family: 'Cinzel', serif;
  padding: 10px 16px;
  border-radius: 10px;
  border: 2px solid;
  font-size: 13px;
  font-weight: bold;
  letter-spacing: 0.04em;
  cursor: pointer;
  transition: all 0.2s;
  text-align: left;
}
.battle-skill-btn:hover:not(:disabled) { transform: translateY(-2px); }
.battle-skill-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.battle-skill-btn.skill-int {
  background: linear-gradient(180deg, #1e2a40 0%, #151e30 100%);
  border-color: #4a90d9;
  color: #7ab8ff;
}
.battle-skill-btn.skill-int:hover:not(:disabled) {
  box-shadow: 0 0 18px rgba(74,144,217,0.4);
  border-color: #6ab0f0;
}
.battle-skill-btn.skill-mem {
  background: linear-gradient(180deg, #2a1e40 0%, #1e1530 100%);
  border-color: #b44cff;
  color: #c88aff;
}
.battle-skill-btn.skill-mem:hover:not(:disabled) {
  box-shadow: 0 0 18px rgba(180,76,255,0.4);
  border-color: #c870ff;
}
.battle-skill-btn.skill-foc {
  background: linear-gradient(180deg, #402a1e 0%, #301e15 100%);
  border-color: #ff7700;
  color: #ffa040;
}
.battle-skill-btn.skill-foc:hover:not(:disabled) {
  box-shadow: 0 0 18px rgba(255,119,0,0.4);
  border-color: #ff9940;
}
.battle-skill-btn.skill-heal {
  background: linear-gradient(180deg, #1e2e20 0%, #152018 100%);
  border-color: #4ae04a;
  color: #70e870;
}
.battle-skill-btn.skill-heal:hover:not(:disabled) {
  box-shadow: 0 0 18px rgba(74,224,74,0.4);
  border-color: #60f060;
}
.battle-log-box {
  background: rgba(0,0,0,0.4);
  border: 1px solid #2a2a3a;
  border-radius: 10px;
  padding: 10px 14px;
  max-height: 80px;
  overflow-y: auto;
  font-family: 'Segoe UI', sans-serif;
}
.battle-log-entry {
  font-size: 13px;
  padding: 2px 0;
  animation: log-fade-in 0.3s ease-out;
}
.battle-log-entry.player { color: #7ab8ff; }
.battle-log-entry.boss { color: #e04040; }
.battle-log-entry.system { color: #ffd700; }
.battle-log-entry.crit { color: #ff7700; font-weight: bold; }
@keyframes log-fade-in {
  from { opacity: 0; transform: translateX(-10px); }
  to { opacity: 1; transform: translateX(0); }
}
.battle-result-overlay {
  position: absolute; inset: 0;
  background: rgba(0,0,0,0.7);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  border-radius: 16px;
  z-index: 10;
  animation: fadeIn 0.4s ease-out;
}
.victory-text {
  font-family: 'Cinzel', serif;
  font-size: 42px;
  color: #ffd700;
  text-shadow: 0 0 30px rgba(255,215,0,0.6), 0 0 60px rgba(255,215,0,0.3);
}
.defeat-text {
  font-family: 'Cinzel', serif;
  font-size: 36px;
  color: #e04040;
  text-shadow: 0 0 20px rgba(224,64,64,0.5);
}

/* Chest animations */
@keyframes chest-bounce {
  0% { transform: scale(0) rotate(-10deg); opacity: 0; }
  50% { transform: scale(1.3) rotate(3deg); opacity: 1; }
  70% { transform: scale(0.9) rotate(-2deg); }
  100% { transform: scale(1) rotate(0deg); opacity: 1; }
}
@keyframes chest-glow {
  0%, 100% { box-shadow: 0 0 20px rgba(255,215,0,0.4), 0 0 40px rgba(255,180,0,0.2); }
  50% { box-shadow: 0 0 40px rgba(255,215,0,0.8), 0 0 80px rgba(255,180,0,0.4); }
}
@keyframes chest-lid-open {
  0% { transform: rotateX(0); }
  100% { transform: rotateX(-110deg); transform-origin: top; }
}
.chest-anim { animation: chest-bounce 0.6s ease-out, chest-glow 2s ease-in-out infinite; }
.chest-reward { animation: bounce 0.5s ease-out; }
.warehouse-chest {
  transition: all 0.3s ease;
  position: relative;
}
.warehouse-chest:hover {
  transform: translateY(-4px);
  box-shadow: 0 8px 30px rgba(255,180,0,0.2);
}
.enhance-target { border-color: #fbbf24 !important; box-shadow: 0 0 12px rgba(251,191,36,0.4); }
.enhance-sacrifice { border-color: #f87171 !important; box-shadow: 0 0 12px rgba(248,113,113,0.4); }

/* Coin reward fly-up animation */
@keyframes coin-fly-up {
  0% { transform: translateY(0) scale(0.5); opacity: 0; }
  20% { transform: translateY(-20px) scale(1.3); opacity: 1; }
  80% { transform: translateY(-60px) scale(1); opacity: 0.8; }
  100% { transform: translateY(-90px) scale(0.8); opacity: 0; }
}
.coin-reward-float {
  position: fixed;
  left: 50%;
  transform: translateX(-50%);
  z-index: 70;
  pointer-events: none;
  font-family: 'Cinzel', serif;
  font-weight: bold;
  font-size: 24px;
  animation: coin-fly-up 1.8s ease-out forwards;
  text-shadow: 0 0 20px currentColor, 0 2px 8px rgba(0,0,0,0.8);
}
.coin-reward-white { color: #C0C0C0; }
.coin-reward-blue { color: #3399FF; }
.coin-reward-purple { color: #B44CFF; }
.coin-reward-orange { color: #FF7700; }

@keyframes float {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-4px); }
}
@keyframes pulse-glow {
  0%, 100% { box-shadow: 0 0 5px #ffd700; }
  50% { box-shadow: 0 0 20px #ffd700, 0 0 40px #ffd700; }
}
@keyframes shimmer {
  0% { background-position: -200% 0; }
  100% { background-position: 200% 0; }
}
@keyframes flipIn {
  0% { transform: rotateY(90deg) scale(0.5); opacity: 0; }
  100% { transform: rotateY(0deg) scale(1.1); opacity: 1; }
}
@keyframes bounce {
  0% { transform: scale(0); }
  60% { transform: scale(1.3); }
  100% { transform: scale(1); }
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes shake {
  0%, 100% { transform: translate(0, 0); }
  25% { transform: translate(-4px, 2px); }
  50% { transform: translate(4px, -2px); }
  75% { transform: translate(-2px, -4px); }
}
@keyframes particleFly {
  0% { transform: translate(0, 0) scale(1); opacity: 1; }
  100% { transform: translate(var(--px), var(--py)) scale(0); opacity: 0; }

/* ========== GACHA ANIMATIONS ========== */
@keyframes gacha-overlay-in {
  0% { opacity: 0; }
  100% { opacity: 1; }
}
@keyframes gacha-overlay-out {
  0% { opacity: 1; }
  100% { opacity: 0; }
}
@keyframes gacha-card-reveal {
  0% { opacity: 0; transform: translateY(60px) scale(0.85); }
  50% { opacity: 0.7; transform: translateY(-6px) scale(1.04); }
  75% { opacity: 1; transform: translateY(2px) scale(0.98); }
  100% { opacity: 1; transform: translateY(0) scale(1); }
}
@keyframes gacha-card-reveal-red {
  0% { opacity: 0; transform: translateY(100px) scale(0.6); filter: brightness(3) saturate(2); }
  25% { opacity: 1; transform: translateY(-12px) scale(1.15); filter: brightness(2) saturate(2); }
  50% { opacity: 1; transform: translateY(2px) scale(0.96); filter: brightness(1); }
  75% { opacity: 1; transform: translateY(-3px) scale(1.03); filter: brightness(1); }
  100% { opacity: 1; transform: translateY(0) scale(1); filter: brightness(1); }
}
@keyframes gacha-card-reveal-orange {
  0% { opacity: 0; transform: translateY(80px) scale(0.7); filter: brightness(2.5) saturate(2); }
  30% { opacity: 1; transform: translateY(-10px) scale(1.1); filter: brightness(1.8) saturate(1.8); }
  55% { opacity: 1; transform: translateY(2px) scale(0.97); filter: brightness(1); }
  80% { opacity: 1; transform: translateY(-2px) scale(1.02); filter: brightness(1); }
  100% { opacity: 1; transform: translateY(0) scale(1); filter: brightness(1); }
}
@keyframes gacha-glow-pulse {
  0%, 100% { box-shadow: 0 0 15px var(--glow-color, rgba(255,200,50,0.3)), 0 0 45px var(--glow-color, rgba(255,200,50,0.1)); }
  50% { box-shadow: 0 0 35px var(--glow-color, rgba(255,200,50,0.6)), 0 0 80px var(--glow-color, rgba(255,200,50,0.25)), 0 0 120px var(--glow-color, rgba(255,200,50,0.08)); }
}
@keyframes gacha-shake-screen {
  0%, 100% { transform: translate(0, 0); }
  10% { transform: translate(-6px, 3px); }
  30% { transform: translate(6px, -3px); }
  50% { transform: translate(-3px, 6px); }
  70% { transform: translate(3px, -6px); }
  90% { transform: translate(-1px, 1px); }
}
@keyframes gacha-pull-pulse {
  0%, 100% { transform: scale(1); opacity: 0.7; filter: brightness(1); }
  50% { transform: scale(1.12); opacity: 1; filter: brightness(1.3); }
}
.gacha-overlay {
  position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 99999;
  background: radial-gradient(ellipse at center, rgba(10,5,30,0.97) 0%, rgba(0,0,0,0.99) 100%);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  animation: gacha-overlay-in 0.35s ease-out both;
}
.gacha-overlay.fade-out { animation: gacha-overlay-out 0.25s ease-in both; }
.gacha-card-wrap {
  animation: gacha-card-reveal 0.7s cubic-bezier(0.22, 0.61, 0.36, 1) both;
}
.gacha-card-wrap.rarity-red {
  animation-name: gacha-card-reveal-red, gacha-glow-pulse;
  animation-duration: 1.0s, 1.5s;
  animation-iteration-count: 1, infinite;
}
.gacha-card-wrap.rarity-orange {
  animation-name: gacha-card-reveal-orange, gacha-glow-pulse;
  animation-duration: 0.85s, 2s;
  animation-iteration-count: 1, infinite;
}
.gacha-card-wrap.rarity-purple { animation-duration: 0.75s; }
.gacha-glow { animation: gacha-glow-pulse 2s ease-in-out infinite; }
.gacha-screen-shake { animation: gacha-shake-screen 0.5s ease-out; }
.gacha-pull-pulse { animation: gacha-pull-pulse 1s ease-in-out infinite; }
.gacha-pull-anim {
  animation: gacha-pull-spin 0.6s ease-in-out;
}

}
.animate-float { animation: float 3s ease-in-out infinite; }
.animate-pulse-glow { animation: pulse-glow 2s ease-in-out infinite; }
.animate-shimmer {
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
  background-size: 200% 100%;
  animation: shimmer 2s infinite;
}
/* Markdown content */
.markdown-body h1, .markdown-body h2, .markdown-body h3 { color: #ffd700; margin: 0.8em 0 0.4em; font-weight: bold; }
.markdown-body h1 { font-size: 1.4em; } .markdown-body h2 { font-size: 1.2em; } .markdown-body h3 { font-size: 1.1em; }
.markdown-body p { margin: 0.4em 0; }
.markdown-body ul, .markdown-body ol { padding-left: 1.5em; margin: 0.4em 0; }
.markdown-body li { margin: 0.2em 0; }
.markdown-body code { background: #1e1e3a; padding: 1px 5px; border-radius: 3px; font-size: 0.9em; }
.markdown-body pre { background: #1e1e3a; padding: 12px 16px; border-radius: 8px; overflow-x: auto; margin: 0.6em 0; }
.markdown-body pre code { background: none; padding: 0; }
.markdown-body table { border-collapse: collapse; width: 100%; margin: 0.6em 0; }
.markdown-body th, .markdown-body td { border: 1px solid #444; padding: 6px 12px; text-align: left; }
.markdown-body th { background: #1e1e3a; color: #ffd700; }
.markdown-body blockquote { border-left: 3px solid #ffd700; padding-left: 12px; margin: 0.6em 0; color: #a0a0b0; }
.markdown-body hr { border: none; border-top: 1px solid #333; margin: 1em 0; }
.markdown-body strong { color: #fff; }
.markdown-body a { color: #4a90d9; }

::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: #1a1a2e; }
::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: #555; }

/* ========== MOBILE RESPONSIVE ========== */
:root {
  --safe-area-bottom: env(safe-area-inset-bottom, 0px);
  --tab-bar-height: 56px;
}

@media (max-width: 767px) {
  /* Bottom Tab Bar */
  .mobile-tab-bar {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 50;
    height: var(--tab-bar-height);
    padding-bottom: var(--safe-area-bottom);
    background: linear-gradient(180deg, #151525, #0B0B16);
    border-top: 1px solid #2A2A40;
    display: flex;
  }
  .mobile-tab-btn {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    color: #908878; font-size: 10px; gap: 2px;
    transition: all 0.2s; min-height: 44px;
  }
  .mobile-tab-btn.active { color: #D4A843; }

// UTILITY: Rarity System
// ============================================================
const RARITIES = ['white', 'green', 'blue', 'purple', 'orange', 'red'];
const BASE_PROBABILITIES = {
  white: 0.35,
  green: 0.28,
  blue: 0.20,
  purple: 0.12,
  orange: 0.04,
  red: 0.01
};
const RARITY_COLORS = {
  white: '#C0C0C0',
  green: '#33FF57',
  blue: '#3399FF',
  purple: '#B44CFF',
  orange: '#FF7700',
  red: '#FF2244'
};
const RARITY_LABELS = {
  white: '普通',
  green: '精良',
  blue: '稀有',
  purple: '史诗',
  orange: '传说',
  red: '神话'
};
const GLOW_COLORS = {
  white: 'rgba(192,192,192,0.4)',
  green: 'rgba(51,255,87,0.5)',
  blue: 'rgba(51,153,255,0.5)',
  purple: 'rgba(180,76,255,0.6)',
  orange: 'rgba(255,119,0,0.6)',
  red: 'rgba(255,34,68,0.7)'
};
function rollRarity(difficulty = 1, dropCount = 0) {
  if (dropCount > 0 && dropCount % 100 === 0) return 'red';
  const probs = {
    ...BASE_PROBABILITIES
  };
  if (difficulty > 1) {
    const mult = Math.pow(1.5, difficulty - 1);
    probs.red *= mult;
    probs.orange *= mult;
    const bonus = probs.red + probs.orange - BASE_PROBABILITIES.red - BASE_PROBABILITIES.orange;
    probs.white = Math.max(0.01, BASE_PROBABILITIES.white - bonus * 0.5);
    probs.green = Math.max(0.01, BASE_PROBABILITIES.green - bonus * 0.3);
    probs.blue = Math.max(0.01, BASE_PROBABILITIES.blue - bonus * 0.2);
  }
  const sum = Object.values(probs).reduce((a, b) => a + b, 0);
  let roll = Math.random() * sum;
  for (const r of RARITIES) {
    roll -= probs[r];
    if (roll <= 0) return r;
  }
  return 'white';
}

// UTILITY: Force-Directed Layout
// ============================================================
function layoutNodes(nodes, edges, width = 2000, height = 1500) {
  const positions = {};
  const cx = width / 2,
    cy = height / 2;
  nodes.forEach(node => {
    if (node.position && node.position.x > 0 && node.position.y > 0) {
      positions[node.id] = {
        x: node.position.x * width,
        y: node.position.y * height
      };
    } else {
      positions[node.id] = {
        x: cx + (Math.random() - 0.5) * width * 0.6,
        y: cy + (Math.random() - 0.5) * height * 0.6
      };
    }
  });
  const repulsion = 5000,
    attraction = 0.01,
    damping = 0.9,
    minDist = 120;
  for (let iter = 0; iter < 100; iter++) {
    const forces = {};
    nodes.forEach(n => {
      forces[n.id] = {
        x: 0,
        y: 0
      };
    });
    for (let i = 0; i < nodes.length; i++) {
      for (let j = i + 1; j < nodes.length; j++) {
        const a = nodes[i].id,
          b = nodes[j].id;
        const dx = positions[a].x - positions[b].x,
          dy = positions[a].y - positions[b].y;
        const dist = Math.max(1, Math.sqrt(dx * dx + dy * dy));
        const force = repulsion / (dist * dist);
        forces[a].x += dx / dist * force;
        forces[a].y += dy / dist * force;
        forces[b].x -= dx / dist * force;
        forces[b].y -= dy / dist * force;
      }
    }
    edges.forEach(({
      from,
      to
    }) => {
      if (!positions[from] || !positions[to]) return;
      const dx = positions[to].x - positions[from].x,
        dy = positions[to].y - positions[from].y;
      forces[from].x += dx * attraction;
      forces[from].y += dy * attraction;
      forces[to].x -= dx * attraction;
      forces[to].y -= dy * attraction;
    });
    nodes.forEach(n => {
      positions[n.id].x += forces[n.id].x * damping;
      positions[n.id].y += forces[n.id].y * damping;
      positions[n.id].x = Math.max(80, Math.min(width - 80, positions[n.id].x));
      positions[n.id].y = Math.max(80, Math.min(height - 80, positions[n.id].y));
    });
  }
  for (let pass = 0; pass < 5; pass++) {
    for (let i = 0; i < nodes.length; i++) {
      for (let j = i + 1; j < nodes.length; j++) {
        const a = nodes[i].id,
          b = nodes[j].id;
        const dx = positions[a].x - positions[b].x,
          dy = positions[a].y - positions[b].y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < minDist && dist > 0) {
          const push = (minDist - dist) / 2;
          positions[a].x += dx / dist * push;
          positions[a].y += dy / dist * push;
          positions[b].x -= dx / dist * push;
          positions[b].y -= dy / dist * push;
        }
      }
    }
  }
  return nodes.map(n => ({
    ...n,
    position: {
      x: positions[n.id].x,
      y: positions[n.id].y
    }
  }));
}

async function chat(messages, opts = {}) {

function extractJson(text) {
  // Remove Markdown code fences
  let cleaned = text.replace(/```json\s*/gi, '').replace(/```\s*/g, '').trim();

  // Find JSON object boundaries: first { and matching last }
  let start = cleaned.indexOf('{');
  let end = cleaned.lastIndexOf('}');
  if (start === -1 || end === -1 || start >= end) {
    throw new Error('AI 未返回有效的 JSON 对象');
  }
  cleaned = cleaned.slice(start, end + 1);

  // Try direct parse
  try {
    return JSON.parse(cleaned);
  } catch (e) {}

  // Repair strategies (ordered from safe to aggressive):
  const strategies = [
  // 1. Escape unescaped newlines & tabs in strings
  s => {
    let r = '',
      inStr = false,
      esc = false;
    for (let i = 0; i < s.length; i++) {
      const c = s[i];
      if (esc) {
        r += c;
        esc = false;
        continue;
      }
      if (c === '\\') {
        r += c;
        esc = true;
        continue;
      }
      if (c === '"') {
        inStr = !inStr;
        r += c;
        continue;
      }
      if (inStr) {
        if (c === '\n') r += '\\n';else if (c === '\r') r += '\\r';else if (c === '\t') r += '\\t';else r += c;
        continue;
      }
      r += c;
    }
    return r;
  },
  // 2. Remove trailing commas before } or ]
  s => s.replace(/,(\s*[}\]])/g, '$1'),
  // 3. Fix unescaped quotes inside strings: if we see pattern like  : "text"extratext"  where the middle " is unescaped
  s => {
    // Replace unescaped quotes in known fields that often contain quotes
    return s.replace(/("(?:name|description|title|step|comment|correctAnswer|question|keyPoints|overallComment|stepFeedback)"\s*:\s*")([^"]*?)"(?=[,}\]])/g, (m, prefix, content) => {
      return prefix + content.replace(/"/g, '\\"') + '"';
    });
  },
  // 4. Close unclosed brackets
  s => {
    let braces = 0,
      brackets = 0;
    for (const c of s) {
      if (c === '{') braces++;
      if (c === '}') braces--;
      if (c === '[') brackets++;
      if (c === ']') brackets--;
    }
    let fixed = s;
    while (brackets > 0) {
      fixed += ']';
      brackets--;
    }
    while (braces > 0) {
      fixed += '}';
      braces--;
    }
    return fixed;
  }];
  let repaired = cleaned;
  for (const fix of strategies) {
    try {
      return JSON.parse(repaired);
    } catch (e) {}
    repaired = fix(repaired);
    try {
      return JSON.parse(repaired);
    } catch (e) {}
  }

  // All failed — capture a snippet for debugging
  const snippet = cleaned.slice(Math.max(0, 220), 280);
  throw new Error('AI 返回的 JSON 格式无法解析。请重试。\n问题区域：...' + snippet + '...');
}
async function analyzePDFContent(pdfText) {
  const sys = `你是一个教育内容分析专家。仔细通读教材文本，构建一张细粒度的网状技能树。

⚠️ 关键要求：只输出纯JSON，不要Markdown代码块，不要任何解释文字。JSON中所有字符串值内的双引号必须转义为\\"，换行必须转义为\\n。

输出格式：

}

严格遵循以下规则：

3. 不要把节点串成一条线！要构建网状结构：
   - 多个节点可以依赖同一个前置节点（发散）
   - 一个节点可以依赖多个前置节点（汇聚）
   - 同一章内的节点可以有交叉依赖
4. edges的from→to表示：必须先掌握from才能学to
5. difficulty 1-5：1=简单概念/记忆，2=基本应用，3=需要推导，4=综合运用，5=高难度
6. position用0-1坐标，尽量让节点均匀分布在画布上（不要堆在一处）
7. 节点id格式："t" + 树序号 + "-n" + 节点序号，如"t1-n1"、"t2-n5"
8. 把教材中所有主要知识点都覆盖到，宁多勿少`;
  const resp = await chat([{

  }], {
    temperature: 0.3,
    maxTokens: 16000
  });
  return extractJson(resp);
}

${

## JSON输出
{"parts":[{"lesson":"讲义(Markdown)","question":"题目","answer":"标准答案","maxScore":30}]}

题目中的 $\{concept\} 替换为该部分讲义讲授的具体概念名称。`;

  const resp = await chat([{

}
async function generateQuestion(nodeName, nodeDescription, difficulty) {
  const diffDesc = difficulty <= 2 ? '直接代入公式即可解决' : difficulty <= 3 ? '需要多步推导+计算' : '需要综合多个知识点进行推导证明';
  const sys = `你是一个严格的出题老师。生成一道计算题或推导题，题目和答案都用Markdown格式，公式用 $...$（行内）和 $...$（块级）。

function getToday() {
  return new Date().toISOString().slice(0, 10);
}
async function loadDay(date) {
  const entry = await db.globalState.get('dt_' + date);
  return entry ? entry.value : {
    date,
    signedIn: false,
    nodesDone: 0,
    claimed: {
      signIn: false,
      nodes: false
    }
  };
}
async function saveDay(d) {
  await db.globalState.put({
    key: 'dt_' + d.date,
    value: d,
    updatedAt: Date.now()
  });
}
async function loadMonth() {
  const all = await db.globalState.toArray();
  const today = getToday();
  const days = {};
  all.filter(e => e.key.startsWith('dt_')).forEach(e => {
    days[e.key.slice(3)] = e.value;
  });
  // Generate last 35 days
  const result = [];
  for (let i = 34; i >= 0; i--) {
    const d = new Date();
    d.setDate(d.getDate() - i);
    const key = d.toISOString().slice(0, 10);
    result.push(days[key] || {
      date: key,
      signedIn: false,
      nodesDone: 0,
      claimed: {
        signIn: false,
        nodes: false
      }
    });
  }
  return result;
}
async function dailySignIn() {
  const today = getToday();
  const d = await loadDay(today);
  if (d.signedIn) return null;
  d.signedIn = true;
  d.claimed.signIn = true;
  await saveDay(d);
  return 'ok';
}
async function dailyMakeup(date) {
  const today = getToday();
  const d = await loadDay(today);
  if (d.nodesDone < 3) return 'not_enough';
  const target = await loadDay(date);
  if (target.signedIn) return 'already_signed';
  if (date >= today) return 'future';
  target.signedIn = true;
  target.claimed.signIn = true;
  target.makeup = true;
  await saveDay(target);
  d.nodesDone -= 3;
  await saveDay(d);
  return 'ok';
}
async function preloadNode(nodeId) {
  const node = await db.skillNodes.get(nodeId);
  if (!node) return;
  if (node.lessonParts || node.questionData?.parts) return; // already preloaded
  if (!node.preloading) await db.skillNodes.update(nodeId, {
    preloading: true,
    updatedAt: Date.now()

    const data = await generateLessonWithQuizzes(node.name, node.description, node.difficulty);
    await db.skillNodes.update(nodeId, {
      questionData: {
        parts: data.parts
      },

      updatedAt: Date.now()
    });

async function extractPDFText(source) {
  if (typeof pdfjsLib === 'undefined') {
    throw new Error('PDF.js 加载失败，请刷新页面重试');
  }
  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  const data = source instanceof File ? await source.arrayBuffer() : source;
  const pdf = await pdfjsLib.getDocument({
    data
  }).promise;
  const pages = [];
  for (let i = 1; i <= pdf.numPages; i++) {
    const page = await pdf.getPage(i);
    const content = await page.getTextContent();
    const text = content.items.map(item => item.str).join(' ').replace(/\s+/g, ' ').trim();
    pages.push({
      pageNum: i,
      text
    });
  }
  return {
    fullText: pages.map(p => p.text).join('\n\n'),
    pages
  };
}

function expForLevel(lv) {
  return lv * 100;
}
function levelUp(state) {
  let exp = state.exp || 0,
    level = state.level || 1;
  let baseStats = state.baseStats || {
    int: 5,
    mem: 5,
    foc: 5,
    end: 5
  };
  let needed = expForLevel(level);
  while (exp >= needed) {
    exp -= needed;
    level++;
    baseStats = {
      int: (baseStats.int || 0) + 2,
      mem: (baseStats.mem || 0) + 2,
      foc: (baseStats.foc || 0) + 2,
      end: (baseStats.end || 0) + 2
    };
    needed = expForLevel(level);
  }
  return {
    exp,
    level,
    baseStats,
    leveledUp: level > (state.level || 1)
  };
}

      };
    case 'DELETE_COURSE':

const DataSync = {

  maxTime(data) {
    let max = 0;
    const check = (arr, key) => arr.forEach(r => {
      const t = r[key || 'updatedAt'] || 0;
      if (t > max) max = t;
    });
    check(data.courses);
    check(data.skillNodes);
    check(data.equipment);
    check(data.globalState);
    return max;
  },
  // Full overwrite: replace ALL local data with remote data
  async fullOverwrite(data) {
    await db.transaction('rw', db.courses, db.skillNodes, db.equipment, db.globalState, async () => {
      await db.courses.clear();

// ============================================================
// SYNC MANAGER (WebSocket relay, full-overwrite, newer-wins)
// ============================================================
let RELAY_URL = localStorage.getItem('sf_relay') || (location.host ? 'ws://' + location.host : 'ws://localhost:3456');

const SyncManager = {
  ws: null, isHost: false, roomCode: null, _ready: false,
  onStatusChange: null, onDataReceived: null,

  _connect() {
    if (SyncManager.ws && SyncManager.ws.readyState === WebSocket.OPEN) return Promise.resolve();
    SyncManager._ready = false;
    return new Promise((resolve, reject) => {
      const ws = new WebSocket(RELAY_URL);
      ws.onopen = () => { SyncManager.ws = ws; SyncManager._ready = true; resolve(); };
      ws.onmessage = e => SyncManager._handleMsg(JSON.parse(e.data));
      ws.onclose = () => { SyncManager._ready = false; SyncManager._setStatus(false, null, '连接断开'); };
      ws.onerror = () => reject(new Error('无法连接中继服务'));
    });
  },

  async createRoom() {
    await SyncManager._connect();
    SyncManager.isHost = true;
    return new Promise(resolve => {
      const handler = e => {
        const msg = JSON.parse(e.data);
        if (msg.type === 'roomCreated') {
          SyncManager.ws.removeEventListener('message', handler);
          SyncManager.roomCode = msg.roomCode;
          SyncManager._setStatus(false, '等待对方加入...');
          resolve(msg.roomCode);
        }
      };
      SyncManager.ws.addEventListener('message', handler);
      SyncManager.ws.send(JSON.stringify({ type: 'create' }));
    });
  },

  async joinRoom(code) {
    await SyncManager._connect();
    SyncManager.isHost = false;
    return new Promise((resolve, reject) => {
      const handler = e => {
        const msg = JSON.parse(e.data);
        if (msg.type === 'joined') {
          SyncManager.ws.removeEventListener('message', handler);
          SyncManager.roomCode = code;
          SyncManager._setStatus(true, '已连接');
          resolve();
        } else if (msg.type === 'error') {
          SyncManager.ws.removeEventListener('message', handler);
          reject(new Error(msg.message));
        }
      };
      SyncManager.ws.addEventListener('message', handler);
      SyncManager.ws.send(JSON.stringify({ type: 'join', roomCode: code }));
    });
  },

  _handleMsg(msg) {
